name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: blackwall
          POSTGRES_PASSWORD: blackwall
          POSTGRES_DB: blackwall
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U blackwall"
          --health-interval 2s --health-timeout 5s --health-retries 15
    env:
      DATABASE_URL: postgres://blackwall:blackwall@localhost:5432/blackwall
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- --deny warnings
      - name: Test
        run: cargo test --workspace
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      # The coverage gate (90%) and its exclusion list live in scripts/coverage.sh,
      # the single source of truth shared by CI and local runs so the two cannot drift.
      - name: Test with coverage gate
        run: bash scripts/coverage.sh

  lab:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install BIRD2 + iproute2
        run: sudo apt-get update && sudo apt-get install -y bird2 iproute2
      - name: Build the lab + the interop test (warm the cache the in-ns run reuses)
        run: cargo build -p blackwall-lab && cargo build -p blackwall-bgp --tests
      - name: Run the lab gate
        run: |
          sudo env "PATH=$HOME/.cargo/bin:$PATH" "HOME=$HOME" \
            "CARGO_HOME=${CARGO_HOME:-$HOME/.cargo}" "RUSTUP_HOME=${RUSTUP_HOME:-$HOME/.rustup}" \
            ./target/debug/lab test crates/blackwall-lab/scenarios/bgp-bird.kdl lab-junit.xml
      - name: Upload JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lab-junit
          path: lab-junit.xml
