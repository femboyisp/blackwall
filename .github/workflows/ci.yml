name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: blackwall
          POSTGRES_PASSWORD: blackwall
          POSTGRES_DB: blackwall
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U blackwall"
          --health-interval 2s --health-timeout 5s --health-retries 15
    env:
      DATABASE_URL: postgres://blackwall:blackwall@localhost:5432/blackwall
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
      - name: Install pinned nightly (blackwall-xdp-ebpf build.rs)
        run: rustup toolchain install nightly-2026-06-29 --component rust-src --profile minimal
      - name: Install bpf-linker
        run: cargo install bpf-linker --locked --version 0.10.3
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- --deny warnings
      - name: Test
        run: cargo test --workspace
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@c93ccc03e00cd0e08e494f5fd058a6c55a6a1907 # v2
        with:
          tool: cargo-llvm-cov
      # The coverage gate (90%) and its exclusion list live in scripts/coverage.sh,
      # the single source of truth shared by CI and local runs so the two cannot drift.
      - name: Test with coverage gate
        run: bash scripts/coverage.sh

  lab:
    runs-on: ubuntu-latest
    needs: check
    # Cap the whole job so a hung gate fails in minutes, not after hours.
    # Sized for the cold build (bpf-linker + hsflowd + all lab/interop/eBPF
    # crates, ~18min uncached) plus the full sequential gate suite; each gate
    # has its own `timeout-minutes`, so this only backstops a total overrun.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Install pinned nightly (blackwall-xdp-ebpf build.rs)
        run: rustup toolchain install nightly-2026-06-29 --component rust-src --profile minimal
      - name: Install bpf-linker
        run: cargo install bpf-linker --locked --version 0.10.3
      - name: Install BIRD2 + Knot + nftables + iproute2 + build hsflowd
        run: |
          sudo apt-get update && sudo apt-get install -y bird2 knot knot-dnsutils nftables iproute2 libpcap-dev
          # host-sflow ships no binary package; build hsflowd + mod_pcap from a pinned tag.
          git clone --depth 1 --branch v2.1.26-1 https://github.com/sflow/host-sflow.git /tmp/host-sflow
          make -C /tmp/host-sflow FEATURES="PCAP"
          sudo mkdir -p /opt/host-sflow
          sudo cp /tmp/host-sflow/src/Linux/hsflowd /tmp/host-sflow/src/Linux/mod_pcap.so /opt/host-sflow/
      - name: Build the lab + interop tests (pre-built binaries the gates run directly)
        run: cargo build -p blackwall-lab && cargo build -p blackwall-trafficgen && bash scripts/build-lab-tests.sh
      - name: Run the lab gate
        timeout-minutes: 6
        run: |
          trap 'rc=$?; exec 1>&3 2>&4; cat lab-gate.log; exit $rc' EXIT
          exec 3>&1 4>&2 >lab-gate.log 2>&1
          sudo timeout --kill-after=15s 300s env "PATH=$HOME/.cargo/bin:$PATH" "HOME=$HOME" \
            "CARGO_HOME=${CARGO_HOME:-$HOME/.cargo}" "RUSTUP_HOME=${RUSTUP_HOME:-$HOME/.rustup}" \
            ./target/debug/lab test crates/blackwall-lab/scenarios/bgp-bird.kdl lab-junit.xml
      - name: Run the lab gate (bgp-md5)
        timeout-minutes: 6
        run: |
          trap 'rc=$?; exec 1>&3 2>&4; cat lab-gate.log; exit $rc' EXIT
          exec 3>&1 4>&2 >lab-gate.log 2>&1
          sudo timeout --kill-after=15s 300s env "PATH=$HOME/.cargo/bin:$PATH" "HOME=$HOME" \
            "CARGO_HOME=${CARGO_HOME:-$HOME/.cargo}" "RUSTUP_HOME=${RUSTUP_HOME:-$HOME/.rustup}" \
            ./target/debug/lab test crates/blackwall-lab/scenarios/bgp-bird-md5.kdl lab-junit-bgp-md5.xml
      - name: Run the lab gate (DNS)
        timeout-minutes: 6
        run: |
          trap 'rc=$?; exec 1>&3 2>&4; cat lab-gate.log; exit $rc' EXIT
          exec 3>&1 4>&2 >lab-gate.log 2>&1
          sudo timeout --kill-after=15s 300s env "PATH=$HOME/.cargo/bin:$PATH" "HOME=$HOME" \
            "CARGO_HOME=${CARGO_HOME:-$HOME/.cargo}" "RUSTUP_HOME=${RUSTUP_HOME:-$HOME/.rustup}" \
            ./target/debug/lab test crates/blackwall-lab/scenarios/dns-knot.kdl lab-junit-dns.xml
      - name: Run the lab gate (shaper)
        timeout-minutes: 6
        run: |
          trap 'rc=$?; exec 1>&3 2>&4; cat lab-gate.log; exit $rc' EXIT
          exec 3>&1 4>&2 >lab-gate.log 2>&1
          sudo timeout --kill-after=15s 300s env "PATH=$HOME/.cargo/bin:$PATH" "HOME=$HOME" \
            "CARGO_HOME=${CARGO_HOME:-$HOME/.cargo}" "RUSTUP_HOME=${RUSTUP_HOME:-$HOME/.rustup}" \
            ./target/debug/lab test crates/blackwall-lab/scenarios/shaper-cake.kdl lab-junit-shaper.xml
      - name: Run the lab gate (flow)
        timeout-minutes: 6
        run: |
          trap 'rc=$?; exec 1>&3 2>&4; cat lab-gate.log; exit $rc' EXIT
          exec 3>&1 4>&2 >lab-gate.log 2>&1
          sudo timeout --kill-after=15s 300s env "PATH=$HOME/.cargo/bin:$PATH" "HOME=$HOME" \
            "CARGO_HOME=${CARGO_HOME:-$HOME/.cargo}" "RUSTUP_HOME=${RUSTUP_HOME:-$HOME/.rustup}" \
            ./target/debug/lab test crates/blackwall-lab/scenarios/flow-sflow.kdl lab-junit-flow.xml
      - name: Run the lab gate (deception)
        timeout-minutes: 6
        run: |
          trap 'rc=$?; exec 1>&3 2>&4; cat lab-gate.log; exit $rc' EXIT
          exec 3>&1 4>&2 >lab-gate.log 2>&1
          sudo timeout --kill-after=15s 300s env "PATH=$HOME/.cargo/bin:$PATH" "HOME=$HOME" \
            "CARGO_HOME=${CARGO_HOME:-$HOME/.cargo}" "RUSTUP_HOME=${RUSTUP_HOME:-$HOME/.rustup}" \
            ./target/debug/lab test crates/blackwall-lab/scenarios/deception-nft.kdl lab-junit-deception.xml
      - name: Run the lab gate (trafficgen)
        timeout-minutes: 6
        run: |
          trap 'rc=$?; exec 1>&3 2>&4; cat lab-gate.log; exit $rc' EXIT
          exec 3>&1 4>&2 >lab-gate.log 2>&1
          sudo timeout --kill-after=15s 300s env "PATH=$HOME/.cargo/bin:$PATH" "HOME=$HOME" \
            "CARGO_HOME=${CARGO_HOME:-$HOME/.cargo}" "RUSTUP_HOME=${RUSTUP_HOME:-$HOME/.rustup}" \
            ./target/debug/lab test crates/blackwall-lab/scenarios/trafficgen-foundation.kdl lab-junit-trafficgen.xml
      - name: Run the lab gate (flow-live)
        # Known-flaky live-sFlow gate (blackwall#88): hsflowd/pcap timing makes
        # it intermittently wedge to its own timeout. Keep running it for signal
        # but don't let its flake fail the whole lab job (main is unprotected;
        # the deterministic gates below still gate). Tracked in #88.
        continue-on-error: true
        timeout-minutes: 6
        run: |
          trap 'rc=$?; exec 1>&3 2>&4; cat lab-gate.log; exit $rc' EXIT
          exec 3>&1 4>&2 >lab-gate.log 2>&1
          sudo timeout --kill-after=15s 300s env "PATH=$HOME/.cargo/bin:$PATH" "HOME=$HOME" \
            "CARGO_HOME=${CARGO_HOME:-$HOME/.cargo}" "RUSTUP_HOME=${RUSTUP_HOME:-$HOME/.rustup}" \
            ./target/debug/lab test crates/blackwall-lab/scenarios/flow-sflow-live.kdl lab-junit-flow-live.xml
      - name: Run the lab gate (deception-resilience)
        timeout-minutes: 6
        run: |
          trap 'rc=$?; exec 1>&3 2>&4; cat lab-gate.log; exit $rc' EXIT
          exec 3>&1 4>&2 >lab-gate.log 2>&1
          sudo timeout --kill-after=15s 300s env "PATH=$HOME/.cargo/bin:$PATH" "HOME=$HOME" \
            "CARGO_HOME=${CARGO_HOME:-$HOME/.cargo}" "RUSTUP_HOME=${RUSTUP_HOME:-$HOME/.rustup}" \
            ./target/debug/lab test crates/blackwall-lab/scenarios/deception-resilience.kdl lab-junit-deception-resilience.xml
      - name: Run the lab gate (deception-syncookie)
        timeout-minutes: 6
        run: |
          trap 'rc=$?; exec 1>&3 2>&4; cat lab-gate.log; exit $rc' EXIT
          exec 3>&1 4>&2 >lab-gate.log 2>&1
          sudo timeout --kill-after=15s 300s env "PATH=$HOME/.cargo/bin:$PATH" "HOME=$HOME" \
            "CARGO_HOME=${CARGO_HOME:-$HOME/.cargo}" "RUSTUP_HOME=${RUSTUP_HOME:-$HOME/.rustup}" \
            ./target/debug/lab test crates/blackwall-lab/scenarios/deception-syncookie.kdl lab-junit-syncookie.xml
      - name: Run the lab gate (deception-syncookie-v6)
        timeout-minutes: 6
        run: |
          trap 'rc=$?; exec 1>&3 2>&4; cat lab-gate.log; exit $rc' EXIT
          exec 3>&1 4>&2 >lab-gate.log 2>&1
          sudo timeout --kill-after=15s 300s env "PATH=$HOME/.cargo/bin:$PATH" "HOME=$HOME" \
            "CARGO_HOME=${CARGO_HOME:-$HOME/.cargo}" "RUSTUP_HOME=${RUSTUP_HOME:-$HOME/.rustup}" \
            ./target/debug/lab test crates/blackwall-lab/scenarios/deception-syncookie-v6.kdl lab-junit-syncookie-v6.xml
      - name: Run the lab gate (rtbh)
        timeout-minutes: 6
        run: |
          trap 'rc=$?; exec 1>&3 2>&4; cat lab-gate.log; exit $rc' EXIT
          exec 3>&1 4>&2 >lab-gate.log 2>&1
          sudo timeout --kill-after=15s 300s env "PATH=$HOME/.cargo/bin:$PATH" "HOME=$HOME" \
            "CARGO_HOME=${CARGO_HOME:-$HOME/.cargo}" "RUSTUP_HOME=${RUSTUP_HOME:-$HOME/.rustup}" \
            ./target/debug/lab test crates/blackwall-lab/scenarios/rtbh-bird.kdl lab-junit-rtbh.xml
      - name: Run the lab gate (flowspec)
        timeout-minutes: 6
        run: |
          trap 'rc=$?; exec 1>&3 2>&4; cat lab-gate.log; exit $rc' EXIT
          exec 3>&1 4>&2 >lab-gate.log 2>&1
          sudo timeout --kill-after=15s 300s env "PATH=$HOME/.cargo/bin:$PATH" "HOME=$HOME" \
            "CARGO_HOME=${CARGO_HOME:-$HOME/.cargo}" "RUSTUP_HOME=${RUSTUP_HOME:-$HOME/.rustup}" \
            ./target/debug/lab test crates/blackwall-lab/scenarios/flowspec-bird.kdl lab-junit-flowspec.xml
      - name: Run the lab gate (flowspec-auto)
        timeout-minutes: 6
        run: |
          trap 'rc=$?; exec 1>&3 2>&4; cat lab-gate.log; exit $rc' EXIT
          exec 3>&1 4>&2 >lab-gate.log 2>&1
          sudo timeout --kill-after=15s 300s env "PATH=$HOME/.cargo/bin:$PATH" "HOME=$HOME" \
            "CARGO_HOME=${CARGO_HOME:-$HOME/.cargo}" "RUSTUP_HOME=${RUSTUP_HOME:-$HOME/.rustup}" \
            ./target/debug/lab test crates/blackwall-lab/scenarios/flowspec-auto-bird.kdl lab-junit-flowspec-auto.xml
      - name: Run the lab gate (xdp prog-test-run)
        timeout-minutes: 6
        run: |
          trap 'rc=$?; exec 1>&3 2>&4; cat lab-gate.log; exit $rc' EXIT
          exec 3>&1 4>&2 >lab-gate.log 2>&1
          # Build the test binary as the normal user (needs nightly+bpf-linker for the eBPF build.rs).
          # `sudo cargo test` fails on GH runners: root has no default rustup toolchain.
          BIN=$(cargo test -p blackwall-xdp --test prog_test_run --no-run --message-format=json \
            | grep -o '"executable":"[^"]*prog_test_run[^"]*"' | head -1 | sed 's/.*":"//;s/"$//')
          echo "test binary: $BIN"
          sudo timeout --kill-after=15s 120s "$BIN" --ignored --nocapture
      - name: Upload JUnit
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: lab-junit
          path: |
            lab-junit.xml
            lab-junit-bgp-md5.xml
            lab-junit-dns.xml
            lab-junit-shaper.xml
            lab-junit-flow.xml
            lab-junit-deception.xml
            lab-junit-trafficgen.xml
            lab-junit-flow-live.xml
            lab-junit-deception-resilience.xml
            lab-junit-syncookie.xml
            lab-junit-syncookie-v6.xml
            lab-junit-rtbh.xml
            lab-junit-flowspec.xml
            lab-junit-flowspec-auto.xml
