            ./target/debug/lab test crates/blackwall-lab/scenarios/flowspec-bird.kdl lab-junit-flowspec.xml
      - name: Run the lab gate (flowspec-auto)
        # RE-ENABLED (#137): same fix as the flowspec gate above.
        timeout-minutes: 6
        run: |
          trap 'rc=$?; exec 1>&3 2>&4; cat lab-gate.log; exit $rc' EXIT
          exec 3>&1 4>&2 >lab-gate.log 2>&1
          # Pre-gate sweep (#137): clear any residue a prior gate's teardown
          # missed (stale bw-* namespaces, processes still attached to them, a
          # leftover host `inet blackwall` nft table / TPROXY policy-route) so it
