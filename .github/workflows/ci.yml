name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: blackwall
          POSTGRES_PASSWORD: blackwall
          POSTGRES_DB: blackwall
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U blackwall"
          --health-interval 2s --health-timeout 5s --health-retries 15
    env:
      DATABASE_URL: postgres://blackwall:blackwall@localhost:5432/blackwall
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- --deny warnings
      - name: Test
        run: cargo test --workspace
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      # These files are excluded from coverage because they require CAP_NET_ADMIN / a live kernel
      # (TPROXY transparent sockets, NFQUEUE + raw sockets, nftables kernel apply, and the daemon's
      # process/runtime glue) and cannot be exercised in CI. All of their non-trivial pure logic is
      # delegated to unit-tested helpers (e.g. transport/packet.rs, render.rs).
      - name: Test with coverage gate
        run: cargo llvm-cov --workspace --fail-under-lines 90 --ignore-filename-regex '(transport/(tproxy|nfqueue)\.rs|blackwall-nft/src/apply\.rs|blackwalld/src/main\.rs)'
