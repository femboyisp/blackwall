            ./target/debug/lab test crates/blackwall-lab/scenarios/rtbh-bird.kdl lab-junit-rtbh.xml
      - name: Run the lab gate (flowspec)
        # RE-ENABLED (#137): the orphaned-BIRD wedge is fixed — teardown reaps
        # BIRD by pidfile AND scoped-reaps anything still attached to the run's
        # namespaces, and the pre-gate `lab down` below clears prior residue.
        timeout-minutes: 6
        run: |
          trap 'rc=$?; exec 1>&3 2>&4; cat lab-gate.log; exit $rc' EXIT
          exec 3>&1 4>&2 >lab-gate.log 2>&1
          # Pre-gate sweep (#137): clear any residue a prior gate's teardown
