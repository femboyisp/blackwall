      - name: Run the lab gate (flow-live)
        # STILL DISABLED (#88): re-enabling it under #137 showed it STILL wedges
        # in CI (~25min on a 6min step) — a DIFFERENT mechanism from the #137
        # cross-gate orphan residue (which is fixed): flow-live's hsflowd holds
        # the CI step's stdout pipe open in-step past GitHub's timeout, so the
        # step never finalizes. Passes locally (no wedge). Needs a dedicated #88
        # fix (ensure hsflowd cannot inherit/hold the runner pipe). The other
        # three #137 gates below (deception-resilience, flowspec, flowspec-auto)
        # ARE re-enabled — their wedge was the cross-gate orphan residue #137 fixes.
        if: false
        timeout-minutes: 6
        run: |
          trap 'rc=$?; exec 1>&3 2>&4; cat lab-gate.log; exit $rc' EXIT
          exec 3>&1 4>&2 >lab-gate.log 2>&1
          # Pre-gate sweep (#137): clear any residue a prior gate's teardown
          # missed (stale bw-* namespaces, processes still attached to them, a
          # leftover host `inet blackwall` nft table / TPROXY policy-route) so it
          # can never wedge this gate. Idempotent no-op on a clean box.
          sudo ./target/debug/lab down || true
          sudo timeout --kill-after=15s 300s env "PATH=$HOME/.cargo/bin:$PATH" "HOME=$HOME" \
            "CARGO_HOME=${CARGO_HOME:-$HOME/.cargo}" "RUSTUP_HOME=${RUSTUP_HOME:-$HOME/.rustup}" \
            ./target/debug/lab test crates/blackwall-lab/scenarios/flow-sflow-live.kdl lab-junit-flow-live.xml
      - name: Run the lab gate (deception-resilience)
        # RE-ENABLED (#137): the connect-flood hang is bounded by its deadline
        # (#136), and the residue this gate's teardown used to leave — which
        # wedged the gate that ran after it — is now reaped (scoped per-namespace
        # process kill + host-dataplane sweep at teardown, plus the pre-gate
        # `lab down` below).
        timeout-minutes: 6
        run: |
          trap 'rc=$?; exec 1>&3 2>&4; cat lab-gate.log; exit $rc' EXIT
          exec 3>&1 4>&2 >lab-gate.log 2>&1
          # Pre-gate sweep (#137): clear any residue a prior gate's teardown
