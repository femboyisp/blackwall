repos:
  - repo: local
    hooks:
      - id: fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        pass_filenames: false
      - id: clippy
        name: cargo clippy
        entry: cargo clippy --workspace --all-targets -- --deny warnings
        language: system
        pass_filenames: false
      - id: test
        name: cargo test
        entry: cargo test --workspace
        language: system
        pass_filenames: false
